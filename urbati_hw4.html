        <!-- Vertex Shader -->
        <script id="vertex-shader" type="x-shader/x-vertex">

        attribute  vec4 vPosition;
        attribute  vec3 vNormal;

        uniform mat4 modelViewMatrix;
        uniform mat4 projectionMatrix;
        uniform vec4 lightPosition;

        varying vec3 fNormal;
        varying vec3 fLight;
        varying vec3 fEye;
        

        void main()
        {

            //compute lighting in eye coordinates
            vec3 pos = (modelViewMatrix * vPosition).xyz;
            
            // light defined in eye coords, so no transformation
            vec3 light = lightPosition.xyz;

            
            // light vector
            fLight = normalize( light - pos );

            // eye is at origin
            vec3 eyePoint = vec3(0.0, 0.0, 0.0);
            
            // eye vector
            fEye = normalize( eyePoint - pos );
            
            vec4 NN = vec4(vNormal,0.0);

            fNormal = normalize( (modelViewMatrix*NN).xyz);
            

            gl_Position = projectionMatrix * modelViewMatrix * vPosition;
            
            // play with these parameters
            //ambient = vec4(0.0, 0.0, 0.0, 1.0);
        }
        </script>

        <script id="fragment-shader" type="x-shader/x-fragment">

        #ifdef GL_ES
        precision highp float;
        #endif

        uniform vec4 ambientProduct, diffuseProduct, specularProduct;
        uniform float shininess;

        varying vec3 fNormal;
        varying vec3 fLight;
        varying vec3 fEye;


        void
        main()
        {
            // Normalize the normal, light, and eye vectors. Incase they are not already normalized.
            vec3 N = normalize( fNormal );
            vec3 L = normalize( fLight );
            vec3 E = normalize( fEye );
            
            vec3 R = 2.0 * dot(L, N) * N - L; // Reflection vector

            // Compute terms in the illumination equation
            vec4 ambient = ambientProduct;

            float Kd = max( dot(L, N), 0.0 );
            vec4  diffuse = Kd*diffuseProduct;

            vec3 V = E; //Renamed just to make it more clear for the equation. 

            float Ks = pow( max(dot(V, R), 0.0), shininess );
            vec4  specular = Ks * specularProduct;
            
            
            if( dot(L, N) < 0.0 ) {
                specular = vec4(0.0, 0.0, 0.0, 1.0);
            } 


            vec4 Color = ambient + diffuse +specular;
            Color.a = 1.0;

            gl_FragColor = Color;
        }
        </script>
    </head>
